<!DOCTYPE html>
<html lang="en">

<head>
  
  <link rel="icon" type="image/png" href="laiba-khan.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mis Laiba Khan! 🎂</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'rose-pastel': '#ffd1dc',
                        'pink-deep': '#ff8fab',
                        'cream': '#fff0f3',
                        'gold-soft': '#d4af37',
                    },
                    fontFamily: {
                        'cursive': ['"Dancing Script"', 'cursive'],
                        'body': ['"Nunito"', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'flicker': 'flicker 0.1s infinite alternate',
                        'slide-up': 'slideUp 1s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        flicker: {
                            '0%': { transform: 'scale(1)', opacity: '1' },
                            '100%': { transform: 'scale(0.9, 1.1)', opacity: '0.8' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px) scale(0.95)', opacity: '0' },
                            '100%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%);
            overflow-x: hidden;
        }

        /* --- Custom CSS Cake --- */
        .cake-container {
            position: relative;
            width: 250px;
            height: 200px;
            margin: 0 auto;
        }

        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #ffc2d1;
            border-radius: 10px 10px 0 0;
            box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.05);
        }

        .layer-bottom {
            bottom: 10px;
            width: 220px;
            height: 70px;
            background: #ffb3c6;
            border-bottom: 2px solid #ff8fab;
        }

        .layer-middle {
            bottom: 80px;
            width: 180px;
            height: 60px;
            background: #ffc2d1;
            border-bottom: 2px solid #ff8fab;
        }

        .layer-top {
            bottom: 140px;
            width: 140px;
            height: 50px;
            background: #ffdeeb;
            border-bottom: 2px solid #ff8fab;
        }

        /* Icing details */
        .icing {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background: #fff;
            border-radius: 10px 10px 50% 50%;
            opacity: 0.8;
        }

        .cherry {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #d00000;
            border-radius: 50%;
            top: -6px;
            box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .cherry:nth-child(1) {
            left: 10%;
        }

        .cherry:nth-child(2) {
            left: 45%;
        }

        .cherry:nth-child(3) {
            right: 10%;
        }

        /* Candles */
        .candle {
            position: absolute;
            bottom: 190px;
            width: 8px;
            height: 35px;
            background: repeating-linear-gradient(45deg, #fff, #fff 4px, #74c0fc 4px, #74c0fc 8px);
            border-radius: 4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .candle-left {
            margin-left: -30px;
            bottom: 185px;
            transform: translateX(-50%) rotate(-5deg);
            background: repeating-linear-gradient(45deg, #fff, #fff 4px, #ff8fab 4px, #ff8fab 8px);
        }

        .candle-right {
            margin-left: 30px;
            bottom: 185px;
            transform: translateX(-50%) rotate(5deg);
            background: repeating-linear-gradient(45deg, #fff, #fff 4px, #a8e6cf 4px, #a8e6cf 8px);
        }

        /* Flame Animation */
        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 15px;
            background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 60%, rgba(255, 87, 34, 0) 100%);
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite alternate;
            opacity: 0.9;
            transform-origin: center bottom;
            transition: all 0.5s ease;
        }

        .flame.out {
            transform: translateX(-50%) scale(0);
            opacity: 0;
        }

        /* Smoke effect for extinguished candle */
        .smoke {
            position: absolute;
            top: -20px;
            left: 50%;
            width: 4px;
            height: 4px;
            background: rgba(100, 100, 100, 0.5);
            border-radius: 50%;
            opacity: 0;
        }

        /* Floating background elements */
        .floating-heart {
            position: absolute;
            color: rgba(255, 182, 193, 0.4);
            animation: float 10s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* Transitions */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        @keyframes customSlideUp {
            0% { transform: translateY(30px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .hidden-el {
            display: none;
        }

        .visible-el {
            display: block;
            animation: customSlideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .visible-el p {
            opacity: 0;
            animation: customSlideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.4s;
        }

        .visible-el div.mt-6 {
            opacity: 0;
            animation: customSlideUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 1.2s;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255, 143, 171, 0.5);
        }
    </style>
</head>

  <audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<body class="h-screen w-screen flex flex-col items-center justify-center font-body text-gray-700 select-none">

    <!-- Background Decoration -->
    <div id="background-decoration" class="fixed inset-0 overflow-hidden pointer-events-none">
        <!-- JS will populate hearts here -->
    </div>

    <!-- 1️⃣ Landing Screen -->
    <div id="landing-card"
        class="relative z-10 p-8 max-w-sm w-full mx-4 bg-white/80 backdrop-blur-sm rounded-3xl shadow-[0_10px_40px_rgba(255,182,193,0.5)] border border-white transform transition-all duration-500 hover:scale-105 cursor-pointer text-center group">
        <div class="absolute -top-6 -left-6 w-12 h-12 bg-pink-200 rounded-full opacity-50 blur-lg animate-pulse"></div>
        <div
            class="absolute -bottom-6 -right-6 w-16 h-16 bg-rose-200 rounded-full opacity-50 blur-lg animate-pulse-slow">
        </div>

        <h2 class="text-2xl font-bold text-gray-600 mb-4">Hello! 👋</h2>
        <p class="text-lg text-gray-500 mb-6">Are you <span class="text-pink-deep font-bold text-xl">Mis Laiba Khan?</span> 💖
        </p>

        <div
            class="inline-block px-6 py-2 bg-gradient-to-r from-pink-300 to-rose-300 text-white rounded-full font-semibold shadow-md group-hover:shadow-lg transition-all">
            Click here if YES ✨
        </div>
    </div>

    <!-- 2️⃣ Main Birthday Page (Hidden Initially) -->
    <div id="main-content"
        class="hidden-el w-full h-full flex-col items-center justify-center relative z-10 transition-opacity duration-1000 opacity-0">

        <!-- Header -->
        <div class="text-center mb-8 relative">
            <h1 class="font-cursive text-5xl md:text-7xl text-pink-deep glow-text mb-2 animate-float">Happy Birthday
            </h1>
            <h2 class="font-cursive text-4xl md:text-6xl text-rose-500 glow-text animate-float-delayed">Mis Laiba Khan 🎉</h2>
        </div>

        <!-- 3️⃣ Cake Section -->
        <div class="cake-container mb-8 transform scale-90 md:scale-100">
            <div class="plate"></div>

            <!-- Layers -->
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle">
                <div class="icing"></div>
            </div>
            <div class="layer layer-top">
                <div class="icing"></div>
                <div class="cherry"></div>
                <div class="cherry"></div>
                <div class="cherry"></div>
            </div>

            <!-- Candles -->
            <div class="candle candle-left">
                <div class="flame" id="flame1"></div>
            </div>
            <div class="candle">
                <div class="flame" id="flame2"></div>
            </div>
            <div class="candle candle-right">
                <div class="flame" id="flame3"></div>
            </div>
        </div>

        <!-- 4️⃣ Interaction Button -->
        <div id="interaction-area" class="text-center h-16">
            <button id="blow-btn"
                class="bg-white border-2 border-pink-200 text-pink-500 px-8 py-3 rounded-full font-bold shadow-sm hover:bg-pink-50 hover:shadow-md transition-all transform active:scale-95">
                Click to make a wish & blow the candles 🎈
            </button>
        </div>

        <!-- 5️⃣ Hidden Message (Appears after interaction) -->
        <div id="birthday-message"
            class="hidden-el max-w-lg mx-auto text-center px-6 py-8 bg-white/60 backdrop-blur-md rounded-2xl shadow-xl mt-4 border border-white">
            <p class="text-lg md:text-xl text-gray-700 leading-relaxed font-body">
                "May your life always be filled with happiness, peace, and beautiful moments. <br><br>
                May your dreams shine brighter every year, and may love surround you always."
            </p>
            <div class="mt-6 text-pink-deep font-cursive text-3xl">
                Stay blessed, today and always. 💕
            </div>
        </div>
    </div>

    <!-- Canvas for Confetti -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50"></canvas>

    <script>
        // --- Elements ---
        const landingCard = document.getElementById('landing-card');
        const mainContent = document.getElementById('main-content');
        const blowBtn = document.getElementById('blow-btn');
        const flames = document.querySelectorAll('.flame');
        const birthdayMessage = document.getElementById('birthday-message');
        const interactionArea = document.getElementById('interaction-area');
        const backgroundDecoration = document.getElementById('background-decoration');

        // --- State ---
        let isCandlesBlown = false;

        // --- Init Background ---
        function createFloatingHearts() {
            const symbols = ['❤', '✨', '🌸', '🎂'];
            for (let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.classList.add('floating-heart');
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.fontSize = (Math.random() * 20 + 10) + 'px';
                el.style.animationDuration = (Math.random() * 5 + 5) + 's';
                el.style.animationDelay = (Math.random() * 5) + 's';
                backgroundDecoration.appendChild(el);
            }
        }
        createFloatingHearts();

        // --- Landing Page Transition ---
        landingCard.addEventListener('click', () => {
            landingCard.classList.add('fade-out');

            setTimeout(() => {
                landingCard.style.display = 'none';
                mainContent.classList.remove('hidden-el');
                mainContent.style.display = 'flex';

                // Trigger reflow for transition
                void mainContent.offsetWidth;

                mainContent.style.opacity = '1';
            }, 800);
        });

        // --- Candle Interaction ---
        blowBtn.addEventListener('click', () => {
            if (isCandlesBlown) return;
            isCandlesBlown = true;

            // 1. Extinguish flames
            flames.forEach((flame, index) => {
                setTimeout(() => {
                    flame.classList.add('out');
                    createSmoke(flame);
                }, index * 100); // Stagger effect
            });

            // 2. Hide Button
            blowBtn.style.opacity = '0';
            setTimeout(() => {
                blowBtn.style.display = 'none';
            }, 500);

            // 3. Trigger Confetti
            setTimeout(() => {
                startConfetti();
            }, 300);

            // 4. Show Message
            setTimeout(() => {
                birthdayMessage.classList.remove('hidden-el');
                birthdayMessage.classList.add('visible-el');
            }, 1000);
        });

        // --- Smoke Effect Logic ---
        function createSmoke(flameElement) {
            const rect = flameElement.getBoundingClientRect();
            // We need to account for the canvas/document coordinates
            const x = rect.left + rect.width / 2;
            const y = rect.top;

            for (let i = 0; i < 5; i++) {
                const smoke = document.createElement('div');
                smoke.classList.add('smoke');
                smoke.style.left = (Math.random() * 10 - 5) + 50 + '%'; // relative to container
                // Actually easier to just append to the candle wrapper or create a fixed overlay.
                // Let's attach to the parent of the flame for simpler positioning
                flameElement.parentElement.appendChild(smoke);

                // Animate via JS for specific trajectory
                const angle = Math.random() * Math.PI / 2 + Math.PI / 4; // Upward
                const velocity = 1 + Math.random();

                let opacity = 0.8;
                let top = -15;
                let left = 50;

                const interval = setInterval(() => {
                    top -= velocity;
                    left += (Math.random() - 0.5);
                    opacity -= 0.02;

                    smoke.style.top = top + 'px';
                    smoke.style.left = left + '%';
                    smoke.style.opacity = opacity;
                    smoke.style.transform = `scale(${1 + (1 - opacity) * 2})`;

                    if (opacity <= 0) {
                        clearInterval(interval);
                        smoke.remove();
                    }
                }, 30);
            }
        }

        // --- Simple Confetti System (Canvas) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confettiParticles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startConfetti() {
            const colors = ['#ff8fab', '#ffc2d1', '#ffd1dc', '#fff0f3', '#d4af37'];

            // Create explosion from center
            for (let i = 0; i < 150; i++) {
                confettiParticles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    r: Math.random() * 6 + 2, // radius
                    dx: (Math.random() - 0.5) * 20, // horizontal velocity
                    dy: (Math.random() - 0.5) * 20 - 5, // vertical velocity (more up)
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10,
                    tiltAngle: Math.random() * Math.PI,
                    tiltAngleIncremental: Math.random() * 0.08 + 0.04
                });
            }
            requestAnimationFrame(updateConfetti);
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            confettiParticles.forEach((p, index) => {
                p.tiltAngle += p.tiltAngleIncremental;

                // Movement
                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2; // Gravity simulation
                p.x += Math.sin(p.tiltAngle) * 2;
                p.x += p.dx * 0.5; // Drag
                p.y += p.dy * 0.5;

                // Slow down explosion velocity
                p.dx *= 0.95;
                p.dy *= 0.95;

                // Draw
                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();

                // Remove off-screen
                if (p.y > canvas.height) {
                    confettiParticles.splice(index, 1);
                }
            });

            if (confettiParticles.length > 0) {
                requestAnimationFrame(updateConfetti);
            }
        }
    </script>
</body>

</html>
